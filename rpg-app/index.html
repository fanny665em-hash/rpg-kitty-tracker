<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RPG Kitty Tracker ⚔️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        /* Mantenemos tus estilos oscuros originales */
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#0a0118;color:#f0e8ff;font-family:'Courier New',monospace;}
        .card {background:#150330;border:1px solid #2d1060;border-radius:10px;padding:16px;margin-bottom:16px;}
        input, textarea {background:#0f0225;border:1px solid #2d1060;color:white;padding:10px;width:100%;border-radius:7px;}
        button {background:#7c3aed;color:white;padding:10px 20px;border:none;border-radius:7px;cursor:pointer;font-weight:bold;}
        .xp-bar {height:12px;background:#1a0838;border-radius:6px;overflow:hidden;border:1px solid #3d1a6e;}
        .xp-fill {height:100%;background:linear-gradient(90deg,#6d28d9,#a855f7);transition:width 0.8s ease;}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
    // --- 1. CONEXIÓN FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCCb8BUJyL3dWgvroW5toXIc7R-FuTwMI4",
        authDomain: "rpg-kitty-tracker.firebaseapp.com",
        projectId: "rpg-kitty-tracker",
        storageBucket: "rpg-kitty-tracker.firebasestorage.app",
        messagingSenderId: "106070405529",
        appId: "1:106070405529:web:df6322b6473ba7468f7f98"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const USER_ID = "jugador_1"; // Tu ID de partida

    const { useState, useEffect } = React;

    function App() {
        // Estados originales
        const [profile, setProfile] = useState({name: "", age: ""});
        const [totalXP, setTotalXP] = useState(0);
        const [habits, setHabits] = useState(Array(15).fill(""));

        // --- 2. CARGA AUTOMÁTICA ---
        useEffect(() => {
            const unsub = onSnapshot(doc(db, "usuarios", USER_ID), (docSnap) => {
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    if(d.profile) setProfile(d.profile);
                    if(d.totalXP) setTotalXP(d.totalXP);
                    if(d.habits) setHabits(d.habits);
                }
            });
            return () => unsub();
        }, []);

        // --- 3. GUARDADO AUTOMÁTICO ---
        const sync = (data) => setDoc(doc(db, "usuarios", USER_ID), data, { merge: true });

        const handleSave = () => {
            sync({ profile, totalXP, habits });
            alert("¡Progreso guardado en la nube! ☁️");
        };

        return (
            <div style={{padding: '20px', maxWidth: '600px', margin: 'auto'}}>
                <header style={{textAlign: 'center', marginBottom: '30px'}}>
                    <h1 style={{color: '#c084fc'}}>⚔️ RPG KITTY TRACKER ⚔️</h1>
                    <p style={{fontSize: '12px', color: '#8b5cf6'}}>NIVEL: {Math.floor(totalXP/100) + 1} | XP: {totalXP}</p>
                    <div className="xp-bar"><div className="xp-fill" style={{width: `${totalXP % 100}%`}}></div></div>
                </header>

                <div className="card">
                    <h3>👤 PERFIL DEL HÉROE</h3>
                    <input 
                        placeholder="Nombre de tu Kitty Guerrero" 
                        value={profile.name} 
                        onChange={e => setProfile({...profile, name: e.target.value})} 
                    />
                </div>

                <div className="card">
                    <h3>🗡️ MISIONES DIARIAS</h3>
                    {habits.slice(0, 5).map((h, i) => (
                        <div key={i} style={{display: 'flex', gap: '10px', marginBottom: '10px'}}>
                            <input 
                                placeholder={`Hábito ${i+1}`} 
                                value={h} 
                                onChange={e => {
                                    const nh = [...habits]; nh[i] = e.target.value; setHabits(nh);
                                }} 
                            />
                            <button onClick={() => setTotalXP(totalXP + 10)}>+10 XP</button>
                        </div>
                    ))}
                </div>

                <button onClick={handleSave} style={{width: '100%', background: '#22c55e'}}>💾 SINCRONIZAR TODO</button>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
